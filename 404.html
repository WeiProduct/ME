<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Not found — Wei Fu</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/ME/assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/ME/css/style.css" />
    <style>
      .notfound {
        min-height: calc(100vh - 5rem);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .notfound-content {
        max-width: 32rem;
        text-align: left;
      }
      .notfound-code {
        font-size: var(--t-sm);
        color: var(--fg-subtle);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin-bottom: var(--s-3);
      }
    </style>
  </head>
  <body>
    <main class="notfound">
      <div class="container">
        <div class="notfound-content">
          <p class="notfound-code">404</p>
          <h1 class="hero-title" style="margin-bottom: var(--s-4)">Not here.</h1>
          <p class="hero-description">
            That page doesn't exist (or moved). Try the
            <a href="/ME/" style="color: var(--fg); text-decoration: underline">home page</a>,
            or email
            <a href="mailto:1597498880weiproduct@gmail.com" style="color: var(--fg); text-decoration: underline"
              >1597498880weiproduct@gmail.com</a
            >
            if you were looking for something specific.
          </p>
        </div>
      </div>
    </main>
  </body>
</html>
